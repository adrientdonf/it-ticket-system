<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>TicketDesk</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#89cff0",
              "on-surface-variant": "#bfc8cd",
              "surface-container": "#1f1f1f",
              "surface-container-lowest": "#0e0e0e",
              "error": "#ffb4ab",
              "on-primary-container": "#005974",
              "surface-container-highest": "#353535",
              "surface-dim": "#131313",
              "on-primary": "#003546",
              "background": "#131313",
              "primary": "#bce8ff",
              "surface-container-low": "#1b1b1b",
              "surface-container-high": "#2a2a2a",
              "surface": "#131313",
              "on-background": "#e2e2e2",
              "surface-tint": "#8ad0f1",
              "error-container": "#93000a",
              "outline": "#899297",
              "on-surface": "#e2e2e2",
              "primary-fixed-dim": "#8ad0f1"
            },
            spacing: {
              "xs": "4px",
              "margin": "32px",
              "gutter": "20px",
              "md": "16px",
              "unit": "4px",
              "lg": "24px",
              "sm": "8px",
              "xl": "40px"
            },
            fontSize: {
              "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "600" }],
              "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "title-md": ["18px", { lineHeight: "24px", fontWeight: "600" }],
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "display-lg": ["48px", { lineHeight: "56px", fontWeight: "700" }],
              "label-caps": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "700" }]
            }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .brand-glow {
  box-shadow: 0 0 60px rgba(137, 207, 240, 0.15);
}
      .input-glow:focus {
        box-shadow: 0 0 15px rgba(137, 207, 240, 0.2);
        border-color: #89CFF0;
      }
      .glow-accent {
        text-shadow: 0 0 20px rgba(137, 207, 240, 0.5);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
